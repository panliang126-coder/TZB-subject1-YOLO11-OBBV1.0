# Mosaic 调度策略对比实验 — 基准配置
# 基于 exp1_focal_v10 配置，唯一变量：close_mosaic (由 CLI --close-mosaic 传入)
#
# 实验矩阵:
#   方案A: --close-mosaic 15   (早期关闭)
#   方案B: --close-mosaic 30   (= exp1_focal_v10, 已跑完, 复用)
#   方案C: --close-mosaic 100  (中期关闭)
#   方案D: --close-mosaic 300  (晚期关闭)
#   方案E: --close-mosaic 500  (等价永不关闭)
#   方案F: --close-mosaic 0    (永不关闭, 官方推荐写法)
#
# 用法:
#   python train.py --cfg configs/exp_mosaic_base.yaml --fold 0 --name exp_mosaic_A_close15 --close-mosaic 15

task: obb
mode: train
model: yolo11n-obb-p2.yaml
data: dataset_yolo/fold_0/data.yaml

# ── 训练策略 ──
epochs: 500
batch: 48
imgsz: 800
workers: 12
device: 0,1,2,3
seed: 42
deterministic: true
pretrained: true
amp: true
fraction: 1.0

# ── 优化器 (auto = MuSGD, lr0 会被强制覆盖为 0.01) ──
optimizer: auto
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.0           # optimizer=auto 会强制覆盖为 0.0
cos_lr: true
nbs: 64

# ── Mosaic 调度 (由 CLI --close-mosaic 覆盖) ──
close_mosaic: 30               # 默认值, CLI 会覆盖

# ── 训练控制 ──
patience: 100
save: true
save_period: -1
exist_ok: false
resume: false
val: true
split: val
plots: true
cache: false
rect: false
single_cls: false
multi_scale: 0.1
compile: false
profile: false
profile_loader: false
overlap_mask: true
mask_ratio: 4
dropout: 0.0

# ── Loss gains ──
box: 7.5
cls: 0.5
cls_pw: 0.5
dfl: 1.5
angle: 1.0

# ── 数据增强 ──
mosaic: 1.0
mosaic9: 0.2
mixup: 0.1
cutmix: 0.0
copy_paste: 0.0
copy_paste_mode: flip
auto_augment: randaugment
erasing: 0.4
hsv_h: 0.015
hsv_s: 0.3
hsv_v: 0.2
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
bgr: 0.0

# ── 增强 Loss ──
use_focal: true
focal_gamma: 2.0
focal_alpha: 0.25
use_wise_iou: false
wise_iou_beta: 6.0
use_kld_angle: false
kld_tau: 1.0
use_slide_loss: false
slide_mu: 0.5
use_scale_aware: false
scale_aware_gamma: 1.0
use_dynamic_topk: false
dynamic_topk_min: 5
dynamic_topk_max: 20

# ── 实验性增强 (关闭) ──
scale_aware_mosaic: 0.0
small_obj_copy_paste: 0.0
rotation_augment: 0.0
rotation_deg: 15.0
