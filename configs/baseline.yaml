# YOLO11-OBB Baseline 训练配置
# 用法: yolo train cfg=configs/baseline.yaml
# 或:   python train.py --baseline --fold 0

task: obb
mode: train
model: yolo11n-obb.yaml
data: dataset_yolo/fold_0/data.yaml

# 基础训练
epochs: 300
batch: 170
imgsz: 640
workers: 16
device: 0,1,2,3,4,5,6,7

# 优化器
optimizer: auto
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
cos_lr: false

# 训练策略
close_mosaic: 10
amp: true
seed: 42
deterministic: true

# Loss gains
box: 7.5
cls: 0.5
dfl: 1.5
angle: 1.0

# 数据增强 (标准)
mosaic: 1.0
mixup: 0.0
cutmix: 0.0
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
flipud: 0.0
fliplr: 0.5

# 关闭增强特性
use_focal: false
use_wise_iou: false
use_kld_angle: false
use_slide_loss: false
use_scale_aware: false
