# Exp1: Focal Loss + Wise-IoU + close_mosaic 延长
# 目标: 验证 Loss 增强 + 更长 Mosaic 对长尾类别和小目标定位的收益
# 基线: enhanced_fold0_1000ep-10 (mAP50-95=0.373)
# 预计收益: +2~3 mAP50-95
# GPU: 0,1,2,3 (4卡并行，与 Exp2 共享 8×A100)

task: obb
mode: train
model: yolo11n-obb-p2.yaml
data: dataset_yolo/fold_0/data.yaml

# ── 训练策略 ──
epochs: 500
batch: 96
imgsz: 800
workers: 24
device: 0,1,2,3,4,5,6,7
seed: 42
deterministic: true

# ── 优化器 (auto = MuSGD, lr=0.01) ──
optimizer: auto
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.0   # optimizer=auto 会强制覆盖为 0.0
cos_lr: true
nbs: 64

# ── 训练策略 ──
close_mosaic: 30   # ← 关键修改: 15→30，P2 层受益
amp: true
multi_scale: 0.1
patience: 100

# ── Loss gains ──
box: 7.5
cls: 0.5
cls_pw: 0.5
dfl: 1.5
angle: 1.0

# ── 数据增强 ──
mosaic: 1.0
mosaic9: 0.2
mixup: 0.1
cutmix: 0.0
copy_paste: 0.0
hsv_h: 0.015
hsv_s: 0.3
hsv_v: 0.2
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5

# ── 增强 Loss (Exp1 核心修改) ──
use_focal: true          # ← ★★★★★ Focal Loss 解决长尾
focal_gamma: 2.0
focal_alpha: 0.25
use_wise_iou: false      # WiseIoU 有 bug 暂时禁用
wise_iou_beta: 6.0
use_kld_angle: false
use_slide_loss: false
use_scale_aware: false
