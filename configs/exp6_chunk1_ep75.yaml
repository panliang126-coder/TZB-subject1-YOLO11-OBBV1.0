# Exp6 续训冲分 - Chunk1: exp6_test50/best.pt → +25ep → 总75ep
# 逐块训练策略, 每25ep评估一次, 自动判断是否继续

task: obb
mode: train
model: /data/work1/panliang/2026/00_TZB_game/YOLOv11/runs/exp6_test50/weights/best.pt
data: dataset_yolo/fold_0/data.yaml

epochs: 25
batch: 96
imgsz: 800
workers: 24
device: 0,1,2,3,4,5,6,7
seed: 42
deterministic: true

optimizer: MuSGD
lr0: 0.0003
lrf: 0.5
momentum: 0.9
weight_decay: 0.0005
warmup_epochs: 1.0
warmup_momentum: 0.8
warmup_bias_lr: 0.0001
cos_lr: true
nbs: 64

close_mosaic: 30
amp: true
patience: 100
save_period: 25

box: 7.5
cls: 0.5
cls_pw: 0.5
dfl: 1.5
angle: 1.0

mosaic: 1.0
mosaic9: 0.2
mixup: 0.1
hsv_h: 0.015
hsv_s: 0.3
hsv_v: 0.2
translate: 0.1
scale: 0.5
fliplr: 0.5

use_focal: false
use_wise_iou: false
