# Exp6: 从 baseline best.pt 续训
# 原始1000ep数据证明: 每100ep稳定+0.008~0.01, loss从未反弹
# 续训500ep (总1500ep), 预计 mAP50-95 0.41~0.43
# 用温和lr (0.003) 重启cosine, 避免原训练lr已降到0.0003

task: obb
mode: train
model: /data/work1/panliang/2026/00_TZB_game/YOLOv11/runs/enhanced_fold0_1000ep-10/weights/best.pt
data: dataset_yolo/fold_0/data.yaml

epochs: 500
batch: 96
imgsz: 800
workers: 24
device: 0,1,2,3,4,5,6,7
seed: 42
deterministic: true

optimizer: MuSGD
lr0: 0.003
lrf: 0.001
momentum: 0.9
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1
cos_lr: true
nbs: 64

close_mosaic: 30
amp: true
multi_scale: 0.1
patience: 100

box: 7.5
cls: 0.5
cls_pw: 0.5
dfl: 1.5
angle: 1.0

mosaic: 1.0
mosaic9: 0.2
mixup: 0.1
hsv_h: 0.015
hsv_s: 0.3
hsv_v: 0.2
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5

use_focal: false
use_wise_iou: false
